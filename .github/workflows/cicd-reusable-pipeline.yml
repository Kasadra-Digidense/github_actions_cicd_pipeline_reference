name: Multi-Cloud Enterprise Reusable CI/CD Pipeline

on:
  workflow_call:

    inputs:

      cloud:
        required: true
        type: string

      aws_region:
        required: false
        type: string
        default: us-east-1

      gcp_region:
        required: false
        type: string
        default: us-central1

      java_dir:
        required: false
        type: string
        default: java_springboot

      python_dir:
        required: false
        type: string
        default: python_app

      node_dir:
        required: false
        type: string
        default: react_node_app

      image_name:
        required: false
        type: string
        default: multiapp

      ecr_repo:
        required: false
        type: string
        default: demos/multiapp

      helm_chart_path:
        required: false
        type: string
        default: ./helm


permissions:
  id-token: write
  contents: read


env:

  JAVA_DIR: ${{ inputs.java_dir }}
  PYTHON_DIR: ${{ inputs.python_dir }}
  NODE_DIR: ${{ inputs.node_dir }}

  IMAGE_NAME: ${{ inputs.image_name }}

  VERSION: v${{ github.run_number }}

  ECR_REPO: ${{ inputs.ecr_repo }}

  AWS_REGION: ${{ inputs.aws_region }}

  GCP_REGION: ${{ inputs.gcp_region }}

  HELM_PATH: ${{ inputs.helm_chart_path }}



# ==========================================================
# BUILD & TEST
# ==========================================================

jobs:

  build-test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      # ---------------- JAVA ----------------

      - name: Setup Java
        if: ${{ hashFiles(format('{0}/pom.xml', env.JAVA_DIR)) != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven


      - name: Java Build & Test
        if: ${{ hashFiles(format('{0}/pom.xml', env.JAVA_DIR)) != '' }}
        run: |
          cd $JAVA_DIR
          mvn clean verify


      # ---------------- PYTHON ----------------

      - name: Setup Python
        if: ${{ hashFiles(format('{0}/requirements.txt', env.PYTHON_DIR)) != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: 3.11


      - name: Python Test
        if: ${{ hashFiles(format('{0}/requirements.txt', env.PYTHON_DIR)) != '' }}
        run: |
          cd $PYTHON_DIR
          pip install -r requirements.txt
          pip install pytest
          pytest


      # ---------------- NODE ----------------

      - name: Setup Node
        if: ${{ hashFiles(format('{0}/package.json', env.NODE_DIR)) != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Node Test
        if: ${{ hashFiles(format('{0}/package.json', env.NODE_DIR)) != '' }}
        run: |
          cd $NODE_DIR
          npm install
          npm test -- --watchAll=false



# ==========================================================
# DOCKER BUILD & PUSH
# ==========================================================

  docker-build-push:

    runs-on: ubuntu-latest
    needs: build-test

    steps:

      - uses: actions/checkout@v4


      # BUILD IMAGE

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$VERSION .
          docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest


# ================= AWS =================

      - name: Configure AWS Credentials
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Login to AWS ECR
        if: inputs.cloud == 'aws'
        uses: aws-actions/amazon-ecr-login@v2


      - name: Push to AWS ECR
        if: inputs.cloud == 'aws'
        run: |
          docker tag $IMAGE_NAME:$VERSION ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:$VERSION
          docker tag $IMAGE_NAME:latest ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:latest

          docker push ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:$VERSION
          docker push ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:latest



# ================= GCP =================

      - name: Authenticate to GCP
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}


      - name: Configure Docker for GCR
        if: inputs.cloud == 'gcp'
        run: gcloud auth configure-docker


      - name: Push to GCR
        if: inputs.cloud == 'gcp'
        run: |
          docker tag $IMAGE_NAME:$VERSION gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:$VERSION
          docker tag $IMAGE_NAME:latest gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:latest

          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:$VERSION
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:latest



# ================= AZURE =================

      - name: Azure Login
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}


      - name: Push to Azure ACR
        if: inputs.cloud == 'azure'
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

          docker tag $IMAGE_NAME:$VERSION ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:$VERSION
          docker tag $IMAGE_NAME:latest ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:latest

          docker push ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:$VERSION
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:latest



# ==========================================================
# HELM DEPLOYMENT
# ==========================================================

  deploy:

    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:

      - uses: actions/checkout@v4


      - name: Setup kubectl
        uses: azure/setup-kubectl@v4


      - name: Setup Helm
        uses: azure/setup-helm@v4



# ================= AWS EKS =================

      - name: Configure AWS Credentials
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Update kubeconfig
        if: inputs.cloud == 'aws'
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER }} \
            --region $AWS_REGION


      - name: Helm Deploy
        if: inputs.cloud == 'aws'
        run: |
          helm upgrade --install multiapp $HELM_PATH \
            --set image.repository=${{ secrets.AWS_ECR_URL }}/$ECR_REPO \
            --set image.tag=$VERSION



# ================= GCP GKE =================

      - name: Authenticate to GCP
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}


      - name: Get GKE Credentials
        if: inputs.cloud == 'gcp'
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --region $GCP_REGION \
            --project ${{ secrets.GCP_PROJECT_ID }}


      - name: Helm Deploy GKE
        if: inputs.cloud == 'gcp'
        run: |
          helm upgrade --install multiapp $HELM_PATH \
            --set image.repository=gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME \
            --set image.tag=$VERSION



# ================= AZURE AKS =================

      - name: Azure Login
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}


      - name: Connect AKS
        if: inputs.cloud == 'azure'
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RG }} \
            --name ${{ secrets.AKS_CLUSTER }}


      - name: Helm Deploy AKS
        if: inputs.cloud == 'azure'
        run: |
          helm upgrade --install multiapp $HELM_PATH \
            --set image.repository=${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME \
            --set image.tag=$VERSION
