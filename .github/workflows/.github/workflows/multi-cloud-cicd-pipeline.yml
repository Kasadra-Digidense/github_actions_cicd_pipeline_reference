name: Multi-Cloud Enterprise CI/CD Pipeline

on:
  workflow_call:
    inputs:
      cloud:
        required: true
        type: string

      java_dir:
        required: false
        type: string

      python_dir:
        required: false
        type: string

      node_dir:
        required: false
        type: string

      image_name:
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  

# ==========================================================
# =================  BUILD & UNIT TEST ==================
# ==========================================================

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ---------------- JAVA ----------------
      - name: Setup Java
        if: ${{ hashFiles(format('{0}/pom.xml', env.JAVA_DIR)) != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Java Build & Test
        if: ${{ hashFiles(format('{0}/pom.xml', env.JAVA_DIR)) != '' }}
        run: |
          cd $JAVA_DIR
          mvn clean verify

      # ---------------- PYTHON ----------------
      - name: Setup Python
        if: ${{ hashFiles(format('{0}/requirements.txt', env.PYTHON_DIR)) != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python Test
        if: ${{ hashFiles(format('{0}/requirements.txt', env.PYTHON_DIR)) != '' }}
        run: |
          cd $PYTHON_DIR
          pip install -r requirements.txt
          pip install pytest
          pytest

      # ---------------- NODE ----------------
      - name: Setup Node
        if: ${{ hashFiles(format('{0}/package.json', env.NODE_DIR)) != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Node Test
        if: ${{ hashFiles(format('{0}/package.json', env.NODE_DIR)) != '' }}
        run: |
          cd $NODE_DIR
          npm install
          npm test -- --watchAll=false

# ==========================================================
# =================  UPLOAD ARTIFACT =======================
# ==========================================================

 
  upload-artifact:
    runs-on: ubuntu-latest
    # needs: build-test
  
    steps:
      - uses: actions/checkout@v4
  
      # ---------------- AWS LOGIN ----------------
      - name: Configure AWS Credentials
        if: github.event.inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::088310115913:role/OpenID-Connect
          aws-region: us-east-1
  
      # ---------------- Upload Full Repo ----------------
      - name: Upload Full Repo
        uses: actions/upload-artifact@v4
        with:
          name: artifact-file
          path: artifact-file
            **/*
            !node_modules/**
            !__pycache__/**
            !image.tar
  
      # ---------------- Setup Java ----------------
      - name: Deploy Java to CodeArtifact
        run: |
          cd java_springboot
      
          VERSION=0.0.${{ github.run_number }}
      
          CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
            --domain my-domain \
            --domain-owner 088310115913 \
            --query authorizationToken \
            --output text \
            --region us-east-1)
      
          mkdir -p ~/.m2
      
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>my-domain-my-repo</id>
                <username>aws</username>
                <password>${CODEARTIFACT_AUTH_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
      
          # SET DYNAMIC VERSION
          mvn versions:set -DnewVersion=$VERSION
      
          # BUILD & DEPLOY
          mvn clean deploy \
            -DaltDeploymentRepository=my-domain-my-repo::default::https://my-domain-088310115913.d.codeartifact.us-east-1.amazonaws.com/maven/my-repo/ \
            -DskipTests
            
      # ---------------- Setup Python ----------------
      - name: Setup Python
        if: hashFiles('python_app/requirements.txt') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
  
      # ---------------- Push Python to CodeArtifact ----------------
      - name: Deploy Python to CodeArtifact
        if: github.event.inputs.cloud == 'aws' && hashFiles('python_app/requirements.txt') != ''
        run: |
          cd python_app
          pip install build twine
          python -m build
  
          aws codeartifact login \
            --tool twine \
            --domain my-domain \
            --domain-owner 088310115913 \
            --repository my-repo \
            --region us-east-1
  
          twine upload dist/*
  
      # ---------------- Setup Node ----------------
      - name: Setup Node
        if: hashFiles('react_node_app/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '18'
  
      # ---------------- Push Node to CodeArtifact ----------------
      - name: Deploy Node to CodeArtifact
        if: github.event.inputs.cloud == 'aws' && hashFiles('react_node_app/package.json') != ''
        run: |
          cd react_node_app
  
          aws codeartifact login \
            --tool npm \
            --domain my-domain \
            --domain-owner 088310115913 \
            --repository my-repo \
            --region us-east-1
  
          npm publish
  
      # ---------------- Push Full Repo Artifact to GCP Artifact Registry ----------------
      - name: Authenticate to GCP
        if: github.event.inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      
      - name: Setup GCloud SDK
        if: github.event.inputs.cloud == 'gcp'
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Push Full Repo Artifact to GCP Artifact Registry
        if: github.event.inputs.cloud == 'gcp'
        run: |
          zip -r full-repo.zip .
      
          gcloud artifacts generic upload \
            --location=us-central1 \
            --repository=my-repo \
            --package=full-repo \
            --version=$VERSION \
            --source=full-repo.zip
        
      # ---------------- Push Full Repo Artifact to Azure ----------------
      - name: Push Full Repo Artifact to Azure Artifacts
        if: github.event.inputs.cloud == 'azure'
        run: |
          cd artifact-file
          zip -r full-repo.zip *
          
          az artifacts universal publish \
            --organization https://dev.azure.com/my-org \
            --feed my-feed \
            --name full-repo \
            --version $VERSION \
            --description "Full repo artifact" \
            --path full-repo.zip
          
