# ==========================================================
# ================= DOCKER BUILD & PUSH ====================
# ==========================================================

  docker-build-push:
    runs-on: ubuntu-latest
    # needs: snyk-scan

    steps:
      - uses: actions/checkout@v4

      # ================= BUILD IMAGE =================
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$VERSION .
          docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest

      # ================= AWS =================
      - name: Configure AWS Credentials
        if: github.event.inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::088310115913:role/OpenID-Connect
          aws-region: us-east-1

      - name: Login to AWS ECR
        if: github.event.inputs.cloud == 'aws'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to AWS ECR
        if: github.event.inputs.cloud == 'aws'
        run: |
          docker tag $IMAGE_NAME:$VERSION ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:$VERSION
          docker tag $IMAGE_NAME:latest ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:latest
          docker push ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:$VERSION
          docker push ${{ secrets.AWS_ECR_URL }}/$ECR_REPO:latest

      # ================= GCP =================
      - name: Authenticate to GCP
        if: github.event.inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        if: github.event.inputs.cloud == 'gcp'
        run: gcloud auth configure-docker

      - name: Push to GCP
        if: github.event.inputs.cloud == 'gcp'
        run: |
          docker tag $IMAGE_NAME:$VERSION gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:$VERSION
          docker tag $IMAGE_NAME:latest gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:latest
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:$VERSION
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME:latest

      # ================= AZURE =================
      - name: Azure Login
        if: github.event.inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Push to Azure ACR
        if: github.event.inputs.cloud == 'azure'
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker tag $IMAGE_NAME:$VERSION ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:$VERSION
          docker tag $IMAGE_NAME:latest ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:latest
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:$VERSION
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:latest
          
# ==========================================================
# ================= HELM DEPLOYMENT (CD) ===================
# ==========================================================

  deploy-helm:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - uses: actions/checkout@v4

      # Install kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # Install Helm
      - name: Setup Helm
        uses: azure/setup-helm@v4

# ================= AWS EKS =================

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::088310115913:role/OpenID-Connect
          aws-region: us-east-1

      # Enable API authentication for EKS
      - name: Enable EKS API Authentication
        run: |
          aws eks update-cluster-config \
            --name ${{ secrets.EKS_CLUSTER }} \
            --access-config authenticationMode=API_AND_CONFIG_MAP \
            --region us-east-1 || true
      
      # Wait until the cluster update is completed
      - name: Wait for Cluster Update
        run: |
          echo "Waiting for cluster to become active..."
          aws eks wait cluster-active \
            --name ${{ secrets.EKS_CLUSTER }} \
            --region us-east-1
      
      # Create access entry for GitHub OIDC role
      - name: Grant EKS Access
        run: |
          aws eks create-access-entry \
            --cluster-name ${{ secrets.EKS_CLUSTER }} \
            --principal-arn arn:aws:iam::088310115913:role/OpenID-Connect \
            --type STANDARD \
            --region us-east-1 || true
      
          aws eks associate-access-policy \
            --cluster-name ${{ secrets.EKS_CLUSTER }} \
            --principal-arn arn:aws:iam::088310115913:role/OpenID-Connect \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region us-east-1 || true
      
      # Get kubeconfig
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER }} \
            --region us-east-1
      
      # Verify access
      - name: Test Cluster Access
        run: kubectl get nodes
        
      - name: Validate Helm Chart
        run: helm lint ./helm
      # Deploy application using Helm
      - name: Helm Deploy
        run: |
          helm upgrade --install multiapp ./helm \
            --set image.repository=${{ secrets.AWS_ECR_URL }}/demos/multiapp \
            --set image.tag=${{ env.VERSION }}
            
# ================= GCP GKE =================

      - name: Authenticate to GCP
        if: github.event.inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Credentials
        if: github.event.inputs.cloud == 'gcp'
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Helm Deploy to GKE
        if: github.event.inputs.cloud == 'gcp'
        run: |
          helm upgrade --install multiapp ./helm \
            --set image.repository=gcr.io/${{ secrets.GCP_PROJECT_ID }}/$IMAGE_NAME \
            --set image.tag=$VERSION

# ================= AZURE AKS =================

      - name: Azure Login
        if: github.event.inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Connect to AKS
        if: github.event.inputs.cloud == 'azure'
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RG }} \
            --name ${{ secrets.AKS_CLUSTER }}

      - name: Helm Deploy to AKS
        if: github.event.inputs.cloud == 'azure'
        run: |
          helm upgrade --install multiapp ./helm \
            --set image.repository=${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME \
            --set image.tag=$VERSION
